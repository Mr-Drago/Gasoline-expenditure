<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Gasolina</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    html { transition: background-color 0.3s, color 0.3s; }
    body { transition: background-color 0.3s, color 0.3s; }

    .corporacion { margin-bottom: 1.5rem; }
    .corporacion:last-child { margin-bottom: 0; }
    .corp-header {
      padding: 0.75rem 0;
      font-weight: 600;
      font-size: 0.75rem;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid #f3f4f6;
    }
    .dark .corp-header { color: #9ca3af; border-bottom-color: #1f2937; }

    .corp-count { font-weight: 400; font-size: 0.7rem; color: #9ca3af; letter-spacing: 0; text-transform: none; }
    .dark .corp-count { color: #6b7280; }

    .marca { margin-bottom: 0.25rem; }
    .marca-header {
      font-weight: 500;
      font-size: 0.8rem;
      color: #9ca3af;
      padding: 0.375rem 0.5rem;
      margin-bottom: 0;
      border-radius: 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      transition: background-color 0.15s, color 0.3s;
    }
    .marca-header:hover { background: #f1f5f9; }
    .dark .marca-header { color: #6b7280; }
    .dark .marca-header:hover { background: #1e293b; }
    .marca-header .arrow {
      font-size: 0.65rem;
      transition: transform 0.2s ease;
      color: #cbd5e1;
    }
    .dark .marca-header .arrow { color: #475569; }
    .marca.active .marca-header .arrow { transform: rotate(90deg); }
    .marca.active .marca-header { color: #475569; }
    .dark .marca.active .marca-header { color: #9ca3af; }

    .modelo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.625rem;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.25s ease, margin 0.3s ease;
      opacity: 0;
      margin-top: 0;
    }
    .marca.active .modelo-grid {
      max-height: 2000px;
      opacity: 1;
      margin-top: 0.625rem;
    }

    .variante-card {
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 0.875rem;
      cursor: pointer;
      transition: all 0.15s ease, background-color 0.3s, border-color 0.3s;
      font-size: 0.8125rem;
      min-width: 220px;
      flex: 1 0 auto;
      max-width: 300px;
      background: white;
    }
    .dark .variante-card {
      background: #1f2937;
      border-color: #374151;
    }
    .variante-card:hover {
      border-color: #93c5fd;
      background: #fafcff;
      box-shadow: 0 4px 16px rgba(59,130,246,0.08);
      transform: translateY(-2px);
    }
    .dark .variante-card:hover {
      background: #1e293b;
      border-color: #3b82f6;
      box-shadow: 0 4px 16px rgba(59,130,246,0.12);
    }
    .variante-card.seleccionado {
      border-color: #3b82f6;
      background: #f0f5ff;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
      transform: translateY(-2px);
    }
    .dark .variante-card.seleccionado {
      background: #172554;
      border-color: #60a5fa;
      box-shadow: 0 0 0 2px rgba(96,165,250,0.2);
    }

    .v-modelo { font-weight: 500; color: #111827; font-size: 0.9rem; }
    .dark .v-modelo { color: #f3f4f6; }

    .v-detalle { font-size: 0.75rem; color: #9ca3af; margin-top: 0.25rem; line-height: 1.4; }

    .resultado { display: none; }
    .resultado.mostrar { display: block; }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    .dark .resultado-carro-text { color: #d1d5db; }

    * { transition: background-color 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 antialiased">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-10 sm:py-14">
    <header class="mb-12 text-center relative">
      <button id="dark-toggle" class="absolute right-0 top-0 p-2 text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 transition-colors" aria-label="Toggle dark mode">
        <svg id="sun-icon" class="w-5 h-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg id="moon-icon" class="w-5 h-5 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>
      <h1 class="text-3xl sm:text-4xl font-semibold tracking-tight bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 bg-clip-text text-transparent">Calculadora de Gasolina</h1>
      <p class="text-gray-400 dark:text-gray-500 mt-2 text-sm">Selecciona un vehículo, ingresa los datos del viaje y calcula tu gasto</p>
    </header>

    <section class="bg-white dark:bg-gray-900 rounded-xl shadow-[0_1px_3px_0_rgba(0,0,0,0.04)] dark:shadow-[0_1px_3px_0_rgba(0,0,0,0.3)] p-6 sm:p-8 mb-6" id="seccion-carros">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-sm font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider">Vehículos disponibles</h2>
        <button id="expand-all" class="text-xs text-blue-500 hover:text-blue-600 dark:text-blue-400 dark:hover:text-blue-300 transition-colors" hidden>Expandir todo</button>
      </div>
      <p class="text-xs text-gray-300 dark:text-gray-600 mb-5">Selecciona una marca para ver sus modelos</p>
      <div id="lista-carros"></div>
    </section>

    <section class="bg-white dark:bg-gray-900 rounded-xl shadow-[0_1px_3px_0_rgba(0,0,0,0.04)] dark:shadow-[0_1px_3px_0_rgba(0,0,0,0.3)] p-6 sm:p-8 mb-6" id="seccion-viaje">
      <h2 class="text-sm font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-6">Datos del viaje</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
        <div>
          <label for="km" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Kilómetros a recorrer</label>
          <input type="number" id="km" placeholder="500" min="1" step="0.1" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm placeholder:text-gray-300 dark:placeholder:text-gray-600 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors">
        </div>
        <div>
          <label for="precio" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Precio por litro ($)</label>
          <input type="number" id="precio" placeholder="23.50" min="0.1" step="0.01" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm placeholder:text-gray-300 dark:placeholder:text-gray-600 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors">
        </div>
      </div>
      <button class="w-full mt-6 py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-200 dark:disabled:bg-gray-700 disabled:text-gray-400 dark:disabled:text-gray-500 text-white text-sm font-medium rounded-lg transition-colors duration-150 cursor-pointer disabled:cursor-not-allowed" id="btn-calcular" disabled>Calcular</button>
    </section>

    <section class="bg-white dark:bg-gray-900 rounded-xl shadow-[0_1px_3px_0_rgba(0,0,0,0.04)] dark:shadow-[0_1px_3px_0_rgba(0,0,0,0.3)] p-6 sm:p-8 mb-6">
      <div class="resultado" id="resultado">
        <div class="flex items-center gap-2 mb-5">
          <div class="w-1 h-5 bg-emerald-400 rounded-full"></div>
          <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100">Resultado</h3>
        </div>
        <div class="text-sm text-gray-500 dark:text-gray-400 mb-5 resultado-carro-text" id="resultado-carro"></div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-5">
            <div class="text-xs text-gray-400 dark:text-gray-500 font-medium uppercase tracking-wider">Gasolina necesaria</div>
            <div class="text-2xl font-semibold mt-2 text-gray-900 dark:text-gray-100" id="res-litros">0 L</div>
          </div>
          <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-5">
            <div class="text-xs text-gray-400 dark:text-gray-500 font-medium uppercase tracking-wider">Costo total</div>
            <div class="text-2xl font-semibold mt-2 text-gray-900 dark:text-gray-100" id="res-costo">$0</div>
          </div>
        </div>
      </div>
    </section>

    <footer class="text-center text-xs text-gray-300 dark:text-gray-600 mt-10">
      Selecciona un vehículo para comenzar
    </footer>
  </div>

  <script src="Carros.js"></script>
  <script>
    let seleccionado = null

    const lista = document.getElementById('lista-carros')
    const btn = document.getElementById('btn-calcular')
    const resultado = document.getElementById('resultado')

    function aplanarAutos() {
      const planos = []
      databaseAutos.forEach(corp => {
        corp.brands.forEach(brand => {
          brand.models.forEach(model => {
            model.variants.forEach(v => {
              planos.push({
                corp: corp.corporation,
                brand: brand.name,
                model: model.model_name,
                decade: model.decade,
                segment: model.segment,
                years: model.years_produced,
                engine: v.engine,
                transmission: v.transmission,
                city: v.fuel_economy_kpl.city,
                highway: v.fuel_economy_kpl.highway,
                combined: v.fuel_economy_kpl.combined
              })
            })
          })
        })
      })
      return planos
    }

    function agrupar(autos) {
      const grupos = {}
      autos.forEach(a => {
        if (!grupos[a.corp]) grupos[a.corp] = {}
        if (!grupos[a.corp][a.brand]) grupos[a.corp][a.brand] = []
        grupos[a.corp][a.brand].push(a)
      })
      return grupos
    }

    function renderizar() {
      const autos = aplanarAutos()
      const grupos = agrupar(autos)
      let html = ''
      let idxGlobal = 0
      for (const [corp, brands] of Object.entries(grupos)) {
        let totalEnCorp = 0
        for (const b in brands) totalEnCorp += brands[b].length
        html += `<div class="corporacion"><div class="corp-header">${corp} <span class="corp-count">${totalEnCorp} vehículos</span></div>`
        for (const [brand, modelos] of Object.entries(brands)) {
          html += `<div class="marca"><div class="marca-header"><span>${brand}</span><span class="arrow">&#9654;</span></div><div class="modelo-grid">`
          modelos.forEach(auto => {
            const sel = seleccionado && autos.indexOf(seleccionado) === idxGlobal ? 'seleccionado' : ''
            html += `
              <div class="variante-card ${sel}" data-index="${idxGlobal}">
                <div class="v-modelo">${auto.model}</div>
                <div class="v-detalle">${auto.engine} · ${auto.transmission}</div>
                <div class="v-detalle">${auto.segment} · ${auto.decade} (${auto.years[0]}-${auto.years[auto.years.length-1]})</div>
                <div class="v-detalle">Rendimiento combinado: <span style="color:#2563eb;font-weight:700">${auto.combined} km/L</span></div>
                <div class="v-detalle">Ciudad: ${auto.city} · Carretera: ${auto.highway} km/L</div>
              </div>`
            idxGlobal++
          })
          html += `</div></div>`
        }
        html += `</div>`
      }
      lista.innerHTML = html

      document.querySelectorAll('.marca-header').forEach(header => {
        header.addEventListener('click', () => {
          header.parentElement.classList.toggle('active')
        })
      })

      document.querySelectorAll('.variante-card').forEach(card => {
        card.addEventListener('click', () => {
          document.querySelectorAll('.variante-card').forEach(c => c.classList.remove('seleccionado'))
          card.classList.add('seleccionado')
          const autos = aplanarAutos()
          seleccionado = autos[parseInt(card.dataset.index)]
          btn.disabled = false
          btn.textContent = `Calcular con ${seleccionado.brand} ${seleccionado.model} (${seleccionado.engine})`
          if (document.getElementById('km').value && document.getElementById('precio').value) {
            calcular()
          }
        })
      })
    }

    function calcular() {
      if (!seleccionado) return
      const km = parseFloat(document.getElementById('km').value)
      const precio = parseFloat(document.getElementById('precio').value)
      if (!km || km <= 0 || !precio || precio <= 0) return

      const litros = km / seleccionado.combined
      const costo = litros * precio

      document.getElementById('resultado-carro').textContent =
        `${seleccionado.brand} ${seleccionado.model} · ${seleccionado.engine} · ${seleccionado.combined} km/L`
      document.getElementById('res-litros').textContent = `${litros.toFixed(2)} L`
      document.getElementById('res-costo').textContent = `$${costo.toFixed(2)}`
      resultado.classList.add('mostrar')
      resultado.scrollIntoView({ behavior: 'smooth', block: 'start' })
    }

    document.getElementById('km').addEventListener('input', () => { if (seleccionado) calcular() })
    document.getElementById('precio').addEventListener('input', () => { if (seleccionado) calcular() })
    document.getElementById('km').addEventListener('keydown', e => { if (e.key === 'Enter') calcular() })
    document.getElementById('precio').addEventListener('keydown', e => { if (e.key === 'Enter') calcular() })
    btn.addEventListener('click', calcular)

    renderizar()

    const toggle = document.getElementById('dark-toggle')
    const html = document.documentElement
    if (localStorage.getItem('dark') === 'true') html.classList.add('dark')
    toggle.addEventListener('click', () => {
      html.classList.toggle('dark')
      localStorage.setItem('dark', html.classList.contains('dark'))
    })
  </script>
</body>
</html>
